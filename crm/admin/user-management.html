<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management — IGNITE_APEX CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090D;--s1:#0F1117;--s2:#141720;--b1:#1E2333;--b2:#272E42;
  --t1:#EEF0F8;--t2:#8892AA;--t3:#4A5268;
  --amber:#F59E0B;--green:#10B981;--blue:#3B82F6;--red:#EF4444;--purple:#8B5CF6;
}
html,body{min-height:100vh;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--t1)}

.topbar{position:sticky;top:0;z-index:100;background:rgba(8,9,13,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between}
.tb-logo{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:var(--amber);letter-spacing:2px}
.tb-nav{display:flex;gap:1.5rem;align-items:center}
.tb-nav a{font-size:.75rem;color:var(--t2);text-decoration:none;font-weight:600;transition:color .2s}
.tb-nav a:hover{color:var(--t1)}

.wrap{max-width:1400px;margin:0 auto;padding:2rem}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.page-title{font-size:2rem;font-weight:700}
.btn-primary{background:var(--amber);color:#000;border:none;padding:.75rem 1.5rem;border-radius:8px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:var(--amber2)}

.tabs{display:flex;gap:.5rem;margin-bottom:2rem;border-bottom:2px solid var(--b1)}
.tab{background:none;border:none;color:var(--t3);padding:1rem 1.5rem;font-size:.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab:hover{color:var(--t1)}

.tab-content{display:none}
.tab-content.active{display:block}

.table-container{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--s2)}
th{padding:1rem;text-align:left;font-size:.75rem;text-transform:uppercase;color:var(--t3);font-weight:700}
td{padding:1rem;border-top:1px solid var(--b1);font-size:.85rem}
tr:hover{background:var(--s2)}

.badge{display:inline-block;padding:.3rem .75rem;border-radius:6px;font-size:.75rem;font-weight:700}
.badge.free{background:#2D1F00;color:var(--amber);border:1px solid var(--amber)}
.badge.pro{background:#020F2A;color:var(--blue);border:1px solid var(--blue)}
.badge.enterprise{background:#160A2E;color:var(--purple);border:1px solid var(--purple)}
.badge.active{background:#021F12;color:var(--green);border:1px solid var(--green)}
.badge.inactive{background:#1F0202;color:var(--red);border:1px solid var(--red)}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:2rem;max-width:500px;width:90%}
.modal-title{font-size:1.3rem;font-weight:700;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.75rem;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:.5rem}
.form-input,.form-select{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:.75rem;color:var(--t1);font-size:.9rem;font-family:inherit}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--amber)}

.loading{text-align:center;padding:3rem;color:var(--t3)}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">IGNITE_APEX Admin</div>
  <div class="tb-nav">
    <a href="../index.html">← Back to CRM</a>
  </div>
</div>

<div class="wrap">
  <div class="page-header">
    <div class="page-title">👥 User Management</div>
    <button class="btn-primary" onclick="openInviteModal()">+ Invite User</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('users')">Users</button>
    <button class="tab" onclick="switchTab('invitations')">Pending Invitations</button>
  </div>

  <!-- Users Tab -->
  <div id="tab-users" class="tab-content active">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name / Email</th>
            <th>Role</th>
            <th>License</th>
            <th>CRM Access</th>
            <th>Last Login</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-table">
          <tr><td colspan="7" class="loading">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Invitations Tab -->
  <div id="tab-invitations" class="tab-content">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Role</th>
            <th>CRM Access</th>
            <th>Invited By</th>
            <th>Invited At</th>
            <th>Expires</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="invitations-table">
          <tr><td colspan="7" class="loading">Loading invitations...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Invite User Modal -->
<div id="invite-modal" class="modal">
  <div class="modal-content">
    <div class="modal-title">Invite New User</div>
    <form onsubmit="sendInvitation(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="invite-email" required />
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" id="invite-role" required>
          <option value="sdr">SDR (Sales Development Rep)</option>
          <option value="account_executive">Account Executive</option>
          <option value="admin">Admin</option>
          <option value="admin_m">Manager</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">License Type</label>
        <select class="form-select" id="invite-license" onchange="updateCRMAccess()">
          <option value="free">Free (Sales OS only)</option>
          <option value="professional">Professional (Sales OS + CRM)</option>
          <option value="enterprise">Enterprise (All features)</option>
        </select>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
          <input type="checkbox" id="invite-crm" style="width:18px;height:18px">
          <span class="form-label" style="margin:0">Enable CRM Access</span>
        </label>
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem">
        <button type="submit" class="btn-primary" style="flex:1">Send Invitation</button>
        <button type="button" class="btn-primary" onclick="closeInviteModal()" style="background:var(--s2);color:var(--t1);flex:1">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../supabase-client.js"></script>

<script>
let currentUser = null;

function waitForSupabaseClient() {
  return new Promise((resolve) => {
    if (window.supabaseClient) { resolve(window.supabaseClient); return; }
    const interval = setInterval(() => {
      if (window.supabaseClient) { clearInterval(interval); resolve(window.supabaseClient); }
    }, 50);
  });
}

(async function init() {
  try {
    const sb = await waitForSupabaseClient();
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '../../app/auth.html'; return; }

    const { data: profile } = await sb.from('users').select('*').eq('id', session.user.id).single();

    // Check if user is admin
    if (!['super_duper_admin', 'super_admin', 'admin', 'admin_m'].includes(profile.role)) {
      alert('Access denied. Admin role required.');
      window.location.href = '../index.html';
      return;
    }

    window.currentUser = profile;
    currentUser = profile;

    await loadUsers();
    await loadInvitations();
  } catch (err) {
    console.error('[UserManagement] Init error:', err);
  }
})();

async function loadUsers() {
  try {
    const { data: users, error } = await window.supabaseClient
      .from('users')
      .select('*')
      .eq('org_id', currentUser.org_id)
      .order('created_at', { ascending: false });

    if (error) throw error;

    const html = users.map(u => `
      <tr>
        <td>
          <div style="font-weight:600">${u.name || '—'}</div>
          <div style="font-size:.75rem;color:var(--t3)">${u.email}</div>
        </td>
        <td>${u.role || 'user'}</td>
        <td><span class="badge ${u.license_type || 'free'}">${u.license_type || 'free'}</span></td>
        <td>${u.crm_enabled ? '✅ Yes' : '❌ No'}</td>
        <td>${u.last_login_at ? new Date(u.last_login_at).toLocaleDateString() : 'Never'}</td>
        <td><span class="badge ${u.is_active ? 'active' : 'inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
        <td>
          <button class="btn-primary" style="padding:.5rem 1rem;font-size:.75rem" onclick="editUser('${u.id}')">
            Edit
          </button>
        </td>
      </tr>
    `).join('');

    document.getElementById('users-table').innerHTML = html || '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--t3)">No users found</td></tr>';
  } catch (err) {
    console.error('[UserManagement] Load users error:', err);
  }
}

async function loadInvitations() {
  try {
    const { data: invitations, error } = await window.supabaseClient
      .from('user_invitations')
      .select('*, invited_by:users!invited_by(name, email)')
      .eq('org_id', currentUser.org_id)
      .is('accepted_at', null)
      .order('created_at', { ascending: false });

    if (error) throw error;

    const html = invitations.map(inv => {
      const expired = new Date(inv.expires_at) < new Date();
      return `
        <tr style="${expired ? 'opacity:.5' : ''}">
          <td>${inv.email}</td>
          <td>${inv.role}</td>
          <td>${inv.crm_enabled ? '✅ Yes' : '❌ No'}</td>
          <td>${inv.invited_by?.name || inv.invited_by?.email || '—'}</td>
          <td>${new Date(inv.created_at).toLocaleDateString()}</td>
          <td>${expired ? '<span style="color:var(--red)">Expired</span>' : new Date(inv.expires_at).toLocaleDateString()}</td>
          <td>
            <button class="btn-primary" style="padding:.5rem 1rem;font-size:.75rem;background:var(--red)" onclick="revokeInvitation('${inv.id}')">
              Revoke
            </button>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('invitations-table').innerHTML = html || '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--t3)">No pending invitations</td></tr>';
  } catch (err) {
    console.error('[UserManagement] Load invitations error:', err);
  }
}

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${tabName}`).classList.add('active');
}

function openInviteModal() {
  document.getElementById('invite-modal').classList.add('active');
}

function closeInviteModal() {
  document.getElementById('invite-modal').classList.remove('active');
  document.getElementById('invite-email').value = '';
}

function updateCRMAccess() {
  const license = document.getElementById('invite-license').value;
  const crmCheckbox = document.getElementById('invite-crm');

  if (license === 'free') {
    crmCheckbox.checked = false;
  } else {
    crmCheckbox.checked = true;
  }
}

async function sendInvitation(e) {
  e.preventDefault();

  try {
    const email = document.getElementById('invite-email').value;
    const role = document.getElementById('invite-role').value;
    const license = document.getElementById('invite-license').value;
    const crmEnabled = document.getElementById('invite-crm').checked;

    // Generate invitation token
    const { data: tokenData } = await window.supabaseClient.rpc('generate_invitation_token');
    const token = tokenData;

    // Create invitation
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + 7); // Expires in 7 days

    const { error } = await window.supabaseClient
      .from('user_invitations')
      .insert({
        org_id: currentUser.org_id,
        email,
        role,
        crm_enabled: crmEnabled,
        invited_by: currentUser.id,
        invitation_token: token,
        expires_at: expiresAt.toISOString()
      });

    if (error) throw error;

    // Generate invitation link
    const inviteLink = `${window.location.origin}/app/accept-invite.html?token=${token}`;

    alert(`✅ Invitation sent!\n\nInvitation link:\n${inviteLink}\n\nSend this link to ${email}`);

    closeInviteModal();
    await loadInvitations();
  } catch (err) {
    alert('Failed to send invitation: ' + err.message);
  }
}

async function revokeInvitation(invitationId) {
  if (!confirm('Revoke this invitation?')) return;

  try {
    const { error } = await window.supabaseClient
      .from('user_invitations')
      .delete()
      .eq('id', invitationId);

    if (error) throw error;

    alert('✅ Invitation revoked');
    await loadInvitations();
  } catch (err) {
    alert('Failed to revoke invitation: ' + err.message);
  }
}

function editUser(userId) {
  alert('User editing coming soon');
}
</script>

</body>
</html>
