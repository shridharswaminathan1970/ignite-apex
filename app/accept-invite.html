<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accept Invitation — IGNITE_APEX</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090D;--s1:#0F1117;--s2:#141720;--b1:#1E2333;
  --t1:#EEF0F8;--t2:#8892AA;--t3:#4A5268;
  --amber:#F59E0B;--green:#10B981;--red:#EF4444;
}
html,body{min-height:100vh;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--t1);display:flex;align-items:center;justify-content:center}

.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:3rem;max-width:500px;width:90%}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--amber);text-align:center;margin-bottom:2rem}
.title{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:1rem}
.subtitle{font-size:.9rem;color:var(--t3);text-align:center;margin-bottom:2rem}

.form-group{margin-bottom:1.5rem}
.form-label{display:block;font-size:.75rem;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:.5rem}
.form-input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:.75rem;color:var(--t1);font-size:.9rem;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--amber)}

.btn{width:100%;background:var(--amber);color:#000;border:none;padding:.75rem;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.error{background:rgba(239,68,68,.1);border:1px solid var(--red);color:var(--red);padding:1rem;border-radius:8px;margin-bottom:1.5rem;font-size:.85rem}
.success{background:rgba(16,185,129,.1);border:1px solid var(--green);color:var(--green);padding:1rem;border-radius:8px;margin-bottom:1.5rem;font-size:.85rem}

.loading{text-align:center;color:var(--t3);padding:2rem}
</style>
</head>
<body>

<div class="card">
  <div class="logo">IGNITE_APEX</div>
  <div id="content">
    <div class="loading">Verifying invitation...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../supabase-client.js"></script>

<script>
let invitation = null;

function waitForSupabaseClient() {
  return new Promise((resolve) => {
    if (window.supabaseClient) { resolve(window.supabaseClient); return; }
    const interval = setInterval(() => {
      if (window.supabaseClient) { clearInterval(interval); resolve(window.supabaseClient); }
    }, 50);
  });
}

(async function init() {
  try {
    const sb = await waitForSupabaseClient();
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      showError('Invalid invitation link. No token provided.');
      return;
    }

    // Verify invitation token
    const { data: inv, error } = await sb
      .from('user_invitations')
      .select('*')
      .eq('invitation_token', token)
      .is('accepted_at', null)
      .single();

    if (error || !inv) {
      showError('Invalid or expired invitation link.');
      return;
    }

    // Check if expired
    if (new Date(inv.expires_at) < new Date()) {
      showError('This invitation has expired. Please request a new invitation.');
      return;
    }

    invitation = inv;
    showAcceptForm();
  } catch (err) {
    console.error('[AcceptInvite] Init error:', err);
    showError('Failed to load invitation: ' + err.message);
  }
})();

function showError(message) {
  document.getElementById('content').innerHTML = `
    <div class="error">${message}</div>
    <a href="./auth.html" style="color:var(--amber);text-decoration:none;display:block;text-align:center">
      ← Back to Login
    </a>
  `;
}

function showSuccess() {
  document.getElementById('content').innerHTML = `
    <div class="success">
      ✅ Account created successfully!<br><br>
      You can now log in with your credentials.
    </div>
    <a href="./auth.html" style="color:var(--amber);text-decoration:none;display:block;text-align:center;font-weight:700">
      Continue to Login →
    </a>
  `;
}

function showAcceptForm() {
  const accessType = invitation.crm_enabled ? 'Sales OS + CRM' : 'Sales OS only';

  document.getElementById('content').innerHTML = `
    <div class="title">Accept Invitation</div>
    <div class="subtitle">
      You've been invited to join as <strong>${invitation.role}</strong><br>
      Access: ${accessType}
    </div>

    <form onsubmit="acceptInvitation(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" value="${invitation.email}" disabled />
      </div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="name" required placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" required minlength="8" placeholder="Min 8 characters" />
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirm-password" required />
      </div>

      <div id="error-message" style="display:none" class="error"></div>

      <button type="submit" class="btn" id="submit-btn">
        Create Account & Accept
      </button>
    </form>
  `;
}

async function acceptInvitation(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-message');

  // Validate
  if (password !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match';
    errorMsg.style.display = 'block';
    return;
  }

  if (password.length < 8) {
    errorMsg.textContent = 'Password must be at least 8 characters';
    errorMsg.style.display = 'block';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  try {
    // 1. Sign up with Supabase Auth
    const { data: authData, error: authError } = await window.supabaseClient.auth.signUp({
      email: invitation.email,
      password: password
    });

    if (authError) throw authError;

    // 2. Create user profile
    const { error: profileError } = await window.supabaseClient
      .from('users')
      .insert({
        id: authData.user.id,
        email: invitation.email,
        name: name,
        role: invitation.role,
        org_id: invitation.org_id,
        crm_enabled: invitation.crm_enabled,
        license_type: invitation.crm_enabled ? 'professional' : 'free',
        is_active: true,
        invited_by: invitation.invited_by,
        invited_at: invitation.created_at,
        invitation_accepted_at: new Date().toISOString()
      });

    if (profileError) throw profileError;

    // 3. Mark invitation as accepted
    await window.supabaseClient
      .from('user_invitations')
      .update({ accepted_at: new Date().toISOString() })
      .eq('id', invitation.id);

    // 4. Sign out (so they can log in properly)
    await window.supabaseClient.auth.signOut();

    // 5. Show success
    showSuccess();
  } catch (err) {
    console.error('[AcceptInvite] Error:', err);
    errorMsg.textContent = 'Failed to create account: ' + err.message;
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account & Accept';
  }
}
</script>

</body>
</html>
