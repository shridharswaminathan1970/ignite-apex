<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Console — IGNITE_APEX</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090D;--s1:#0F1117;--s2:#141720;--b1:#1E2333;--b2:#272E42;--t1:#EEF0F8;--t2:#8892AA;--t3:#4A5268;--amber:#F59E0B;--amber2:#FCD34D;--green:#10B981;--blue:#3B82F6;--red:#EF4444}
html,body{min-height:100vh;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--t1)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.header{background:var(--s1);border-bottom:1px solid var(--b1);padding:1rem 2rem;position:sticky;top:0;z-index:100}
.header-content{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--amber);letter-spacing:2px}
.user-badge{background:var(--b1);padding:.5rem 1rem;border-radius:8px;font-size:.75rem}
.btn{background:var(--b2);color:var(--t2);padding:.5rem 1rem;border-radius:8px;font-size:.8rem;border:1px solid var(--b1);cursor:pointer;transition:all .2s;text-decoration:none}
.btn:hover{background:var(--amber);color:#000;border-color:var(--amber)}
.btn-green{background:var(--green);color:#fff;border:none}
.btn-green:hover{background:#059669}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:2rem}
.page-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:.5rem}
.page-subtitle{color:var(--t3);margin-bottom:2rem}
.scope-badge{background:var(--b2);color:var(--amber);padding:.5rem 1rem;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:2rem;display:inline-block}
.user-list{list-style:none;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:2rem}
.user-item{padding:1rem;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:start}
.user-item:last-child{border-bottom:none}
.user-name{font-weight:600;color:var(--t1);margin-bottom:.25rem}
.user-meta{font-size:.75rem;color:var(--t3);display:flex;gap:1rem;flex-wrap:wrap}
.role-badge{background:var(--b2);padding:.2rem .5rem;border-radius:4px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.role-super_admin{background:var(--red);color:#fff}
.role-admin{background:var(--amber);color:#000}
.role-admin_m{background:var(--blue);color:#fff}
.role-sdr{background:var(--green);color:#000}
.role-account_executive{background:var(--t3);color:var(--t1)}
.user-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn-sm{padding:.4rem .75rem;font-size:.75rem;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--t2);cursor:pointer;transition:all .2s}
.btn-sm:hover{background:var(--b1);color:var(--t1)}
.btn-sm.btn-green{background:var(--green);color:#fff;border:none}
.btn-sm.btn-green:hover{background:#059669}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.loading{text-align:center;padding:3rem;color:var(--t2)}
.empty-state{text-align:center;padding:3rem;color:var(--t3)}
.info-box{background:var(--b2);border-left:4px solid var(--blue);padding:1rem;border-radius:8px;margin-bottom:2rem}
.info-box p{font-size:.85rem;color:var(--t2);margin:0}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="header-logo">ADMIN CONSOLE</div>
    <div style="display:flex;align-items:center;gap:1.5rem">
      <div class="user-badge">
        <div id="admin-name" style="color:var(--t1);font-weight:600">Loading...</div>
        <div id="admin-role" style="color:var(--amber);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:.7rem"></div>
      </div>
      <a href="./teams.html" class="btn">Manage Teams</a>
      <a href="./launcher.html" class="btn">Launcher</a>
      <button class="btn" onclick="logout()">Sign Out</button>
    </div>
  </div>
</div>

<div class="container">
  <h1 class="page-title">User Management</h1>
  <p class="page-subtitle">Manage users within your organization</p>

  <div id="scope-info" class="info-box" style="display:none">
    <p id="scope-text"></p>
  </div>

  <div class="scope-badge" id="scope-badge"></div>

  <div style="margin-bottom:2rem">
    <button id="add-user-btn" class="btn btn-green" onclick="openAddUserModal()">+ Add User</button>
  </div>

  <div id="loading" class="loading">Loading users...</div>
  <div id="empty" class="empty-state" style="display:none">No users found</div>
  <ul id="user-list" class="user-list" style="display:none"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../supabase-client.js"></script>
<script>
let sb = null;
let currentAdmin = null;

async function init() {
  sb = window.supabaseClient;

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.replace('./auth.html');
    return;
  }

  const { data: profile } = await sb.from('users').select('*').eq('id', session.user.id).single();

  if (!profile || !['super_admin', 'admin'].includes(profile.role)) {
    alert('Access denied. Super Admin or Admin role required.');
    window.location.replace('./launcher.html');
    return;
  }

  currentAdmin = profile;
  document.getElementById('admin-name').textContent = profile.name || session.user.email;
  document.getElementById('admin-role').textContent = profile.role.replace(/_/g, ' ');

  // Set scope info
  if (profile.role === 'super_admin') {
    document.getElementById('scope-badge').textContent = 'Organization-Wide Access';
    document.getElementById('scope-text').textContent = '✓ You can manage all users in your organization except other super_admins and super_duper_admins.';
  } else if (profile.role === 'admin') {
    document.getElementById('scope-badge').textContent = 'Downline Access Only';
    document.getElementById('scope-text').textContent = '✓ You can manage users in your downline (those who report to you directly or indirectly). You cannot manage admin_m, admin, super_admin, or super_duper_admin roles.';
  }
  document.getElementById('scope-info').style.display = 'block';

  loadUsers();
}

async function loadUsers() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('user-list').style.display = 'none';

  let users = [];

  if (currentAdmin.role === 'super_admin') {
    // Super admin sees all in org EXCEPT super_duper_admin and other super_admins
    const { data } = await sb
      .from('users')
      .select('*')
      .eq('org_id', currentAdmin.org_id)
      .not('role', 'in', '(super_duper_admin,super_admin)')
      .order('name');
    users = data || [];
  } else if (currentAdmin.role === 'admin') {
    // Admin sees only downline (recursive manager_id chain)
    const { data } = await sb
      .from('users')
      .select('*')
      .eq('org_id', currentAdmin.org_id)
      .order('name');

    // Filter to downline only (users where admin is in their manager chain)
    if (data) {
      const downline = await getDownlineUsers(data, currentAdmin.id);
      users = downline;
    }
  }

  document.getElementById('loading').style.display = 'none';

  if (!users || users.length === 0) {
    document.getElementById('empty').textContent = 'No users in your scope';
    document.getElementById('empty').style.display = 'block';
    return;
  }

  document.getElementById('user-list').style.display = 'block';
  const userList = document.getElementById('user-list');
  userList.innerHTML = '';

  users.forEach(user => {
    const li = document.createElement('li');
    li.className = 'user-item';
    const status = user.status || 'active';
    const statusBadge = status === 'suspended' ? '<span style="color:var(--amber)">⏸️ Suspended</span>' :
                        status === 'deactivated' ? '<span style="color:var(--red)">🔴 Deactivated</span>' :
                        '<span style="color:var(--green)">🟢 Active</span>';

    const userName = (user.name || user.email).replace(/'/g, "\\'");

    // Determine which actions are allowed based on current admin role and target user
    const canManage = canManageUser(user);
    const canTransfer = canManage && currentAdmin.role === 'super_admin'; // Only super_admin can transfer cross-manager
    const canPromote = canManage;
    const canSuspend = canManage;
    const canDelete = canManage && ['super_admin'].includes(currentAdmin.role);

    li.innerHTML = `
      <div>
        <div class="user-name">${user.name || user.email}</div>
        <div class="user-meta">
          <span class="role-badge role-${user.role}">${user.role.replace(/_/g, ' ')}</span>
          <span>📧 ${user.email}</span>
          ${statusBadge}
        </div>
      </div>
      <div class="user-actions">
        ${canManage ? `<button class="btn-sm" onclick="editUser('${user.id}', '${userName}')">Edit</button>` : ''}
        ${canTransfer ? `<button class="btn-sm" onclick="transferUser('${user.id}', '${userName}')">Transfer</button>` : ''}
        ${canPromote ? `<button class="btn-sm" onclick="promoteUser('${user.id}', '${userName}', '${user.role}')">Change Role</button>` : ''}
        ${canManage ? `<button class="btn-sm" onclick="manageUser('reset_password', '${user.id}', '${user.email}')">Reset Password</button>` : ''}
        ${canSuspend && status === 'active' ? `<button class="btn-sm" onclick="manageUser('suspend', '${user.id}', '${userName}')">Suspend</button>` : ''}
        ${canSuspend && status !== 'active' ? `<button class="btn-sm btn-green" onclick="manageUser('reactivate', '${user.id}', '${userName}')">Reactivate</button>` : ''}
        ${canDelete ? `<button class="btn-sm btn-danger" onclick="manageUser('delete', '${user.id}', '${userName}')">Delete</button>` : ''}
      </div>
    `;

    userList.appendChild(li);
  });
}

function canManageUser(targetUser) {
  // Cannot manage yourself
  if (targetUser.id === currentAdmin.id) return false;

  // Cannot manage protected roles
  if (['super_duper_admin', 'super_admin', 'admin', 'admin_m'].includes(targetUser.role)) {
    return false;
  }

  // Super admin can manage all non-protected users in org
  if (currentAdmin.role === 'super_admin') return true;

  // Admin can only manage their downline
  if (currentAdmin.role === 'admin') {
    // This check is already done in loadUsers() - if user is in the list, they can manage
    return true;
  }

  return false;
}

async function getDownlineUsers(allUsers, managerId) {
  const downline = [];
  const directReports = allUsers.filter(u => u.manager_id === managerId);

  for (const user of directReports) {
    // Don't include protected roles
    if (!['super_duper_admin', 'super_admin', 'admin', 'admin_m'].includes(user.role)) {
      downline.push(user);
    }
    // Recursively get their reports
    const subDownline = await getDownlineUsers(allUsers, user.id);
    downline.push(...subDownline);
  }

  return downline;
}

// Copy all user management functions from master-console.html
// (manageUser, editUser, transferUser, promoteUser, openAddUserModal, etc.)
// For brevity, I'll include key ones:

async function manageUser(action, userId, identifier) {
  const labels = {
    suspend: 'Suspend',
    reactivate: 'Reactivate',
    deactivate: 'Deactivate',
    delete: 'Delete',
    reset_password: 'Generate password reset for'
  };

  if (!confirm(`${labels[action]} user: ${identifier}?`)) return;

  try {
    const { data: { session } } = await sb.auth.getSession();
    const response = await fetch(`https://gokslnrvxqledagcwghq.supabase.co/functions/v1/manage-user`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({ action, userId })
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error || `Failed to ${action} user`);

    if (action === 'reset_password') {
      alert(`✓ Password reset email sent to shaamel@shaamelz.com for user: ${identifier}`);
    } else {
      alert(`✓ User ${action}ed successfully`);
      loadUsers();
    }
  } catch (err) {
    console.error(`[Admin] ${action} error:`, err);
    alert(`Error: ${err.message}`);
  }
}

async function editUser(userId, currentName) {
  const newName = prompt(`Edit user name:\n\nCurrent: ${currentName}`, currentName);
  if (!newName || newName === currentName) return;

  try {
    const { data: { session } } = await sb.auth.getSession();
    const response = await fetch(`https://gokslnrvxqledagcwghq.supabase.co/functions/v1/manage-user`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        action: 'update',
        userId,
        updates: { name: newName }
      })
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error || 'Failed to update user');

    alert('✓ User updated successfully');
    loadUsers();
  } catch (err) {
    console.error('[Admin] Edit user error:', err);
    alert(`Error: ${err.message}`);
  }
}

async function transferUser(userId, userName) {
  try {
    const { data: teams } = await sb.from('teams').select('id, name').eq('org_id', currentAdmin.org_id).order('name');
    const { data: managers } = await sb.from('users').select('id, name, role').eq('org_id', currentAdmin.org_id).in('role', ['super_admin', 'admin']).order('name');

    if (!teams || teams.length === 0) {
      const { data: newTeam } = await sb.from('teams').insert({
        name: 'NEW',
        org_id: currentAdmin.org_id
      }).select().single();
      teams = [newTeam];
      alert('No teams found. Created "NEW" team automatically.');
    }

    if (!managers || managers.length === 0) {
      alert('No managers found in this organization.');
      return;
    }

    const modalHtml = `
      <div id="transfer-modal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10000">
        <div style="background:#0F1117;border:1px solid #1E2333;border-radius:12px;padding:2rem;max-width:500px;width:90%">
          <h3 style="color:#F59E0B;margin-bottom:1rem">Transfer ${userName}</h3>

          <div style="margin-bottom:1.5rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Select Team</label>
            <select id="transfer-team" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
              ${teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
            </select>
          </div>

          <div style="margin-bottom:1.5rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Assign Manager</label>
            <select id="transfer-manager" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
              ${managers.map(m => `<option value="${m.id}">${m.name} (${m.role.replace(/_/g, ' ')})</option>`).join('')}
            </select>
          </div>

          <div style="display:flex;gap:.75rem;justify-content:flex-end">
            <button onclick="closeModal('transfer-modal')" style="background:#272E42;color:#8892AA;padding:.75rem 1.5rem;border-radius:8px;border:1px solid #1E2333;cursor:pointer">Cancel</button>
            <button onclick="executeTransfer('${userId}')" style="background:#F59E0B;color:#000;padding:.75rem 1.5rem;border-radius:8px;border:none;font-weight:700;cursor:pointer">Transfer</button>
          </div>
        </div>
      </div>
    `;

    document.body.insertAdjacentHTML('beforeend', modalHtml);
  } catch (err) {
    console.error('[Admin] Transfer error:', err);
    alert(`Error: ${err.message}`);
  }
}

async function executeTransfer(userId) {
  try {
    const teamId = document.getElementById('transfer-team').value;
    const managerId = document.getElementById('transfer-manager').value;

    if (!teamId || !managerId) {
      alert('Please select both team and manager');
      return;
    }

    const { data: { session } } = await sb.auth.getSession();
    const response = await fetch(`https://gokslnrvxqledagcwghq.supabase.co/functions/v1/manage-user`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        action: 'transfer',
        userId,
        updates: { teamId, managerId }
      })
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error || 'Failed to transfer user');

    closeModal('transfer-modal');
    alert('✓ User transferred successfully');
    loadUsers();
  } catch (err) {
    console.error('[Admin] Execute transfer error:', err);
    alert(`Error: ${err.message}`);
  }
}

async function promoteUser(userId, userName, currentRole) {
  try {
    const { data: { session } } = await sb.auth.getSession();

    // Define allowed roles based on current admin role
    const allRoles = [
      { value: 'sdr', label: 'SDR', color: '#10B981' },
      { value: 'account_executive', label: 'Account Executive', color: '#4A5268' },
      { value: 'admin', label: 'Admin', color: '#F59E0B' },
      { value: 'admin_m', label: 'Admin M (Read-Only)', color: '#3B82F6' }
    ];

    // Filter roles based on current admin's permissions
    let allowedRoles = [];
    if (currentAdmin.role === 'super_admin') {
      allowedRoles = allRoles; // Can assign up to admin_m
    } else if (currentAdmin.role === 'admin') {
      allowedRoles = allRoles.filter(r => ['sdr', 'account_executive'].includes(r.value));
    }

    const modalHtml = `
      <div id="role-modal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10000">
        <div style="background:#0F1117;border:1px solid #1E2333;border-radius:12px;padding:2rem;max-width:600px;width:90%">
          <h3 style="color:#F59E0B;margin-bottom:.5rem">Change Role for ${userName}</h3>
          <p style="color:#8892AA;font-size:.85rem;margin-bottom:1.5rem">Current role: <strong style="color:#EEF0F8">${currentRole.replace(/_/g, ' ').toUpperCase()}</strong></p>

          <div style="margin-bottom:1.5rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.75rem">Select New Role</label>

            <div style="display:grid;gap:.75rem">
              ${allowedRoles.map(role => `
                <label style="display:flex;align-items:center;background:${currentRole === role.value ? '#1E2333' : '#141720'};border:2px solid ${currentRole === role.value ? role.color : '#1E2333'};border-radius:8px;padding:1rem;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='${role.color}'" onmouseout="this.style.borderColor='${currentRole === role.value ? role.color : '#1E2333'}'">
                  <input type="radio" name="new-role" value="${role.value}" ${currentRole === role.value ? 'checked' : ''} style="margin-right:1rem;width:20px;height:20px;accent-color:${role.color}">
                  <div>
                    <div style="font-weight:700;color:#EEF0F8;margin-bottom:.25rem">${role.label}</div>
                    <div style="font-size:.75rem;color:#8892AA">${getRoleDescription(role.value)}</div>
                  </div>
                </label>
              `).join('')}
            </div>
          </div>

          <div style="display:flex;gap:.75rem;justify-content:flex-end">
            <button onclick="closeModal('role-modal')" style="background:#272E42;color:#8892AA;padding:.75rem 1.5rem;border-radius:8px;border:1px solid #1E2333;cursor:pointer">Cancel</button>
            <button onclick="executeRoleChange('${userId}')" style="background:#F59E0B;color:#000;padding:.75rem 1.5rem;border-radius:8px;border:none;font-weight:700;cursor:pointer">Change Role</button>
          </div>
        </div>
      </div>
    `;

    document.body.insertAdjacentHTML('beforeend', modalHtml);

  } catch (err) {
    console.error('[Admin] Promote error:', err);
    alert(`Error: ${err.message}`);
  }
}

function getRoleDescription(role) {
  const descriptions = {
    'sdr': 'Sales Development Representative - Lead generation & qualification',
    'account_executive': 'Account Executive - Manage deals & close opportunities',
    'admin': 'Admin - Manage team members & downline access',
    'admin_m': 'Manager (Read-Only) - View all company data, no management access'
  };
  return descriptions[role] || '';
}

async function executeRoleChange(userId) {
  try {
    const selectedRole = document.querySelector('input[name="new-role"]:checked');
    if (!selectedRole) {
      alert('Please select a role');
      return;
    }

    const newRole = selectedRole.value;

    const { data: { session } } = await sb.auth.getSession();
    const response = await fetch(`https://gokslnrvxqledagcwghq.supabase.co/functions/v1/manage-user`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        action: 'promote',
        userId,
        updates: { newRole }
      })
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error || 'Failed to change role');

    closeModal('role-modal');
    alert(`✓ User role changed to ${newRole.replace(/_/g, ' ')}`);
    loadUsers();
  } catch (err) {
    console.error('[Admin] Execute role change error:', err);
    alert(`Error: ${err.message}`);
  }
}

async function openAddUserModal() {
  try {
    const { data: teams } = await sb.from('teams').select('id, name').eq('org_id', currentAdmin.org_id).order('name');
    const { data: managers } = await sb.from('users').select('id, name, role').eq('org_id', currentAdmin.org_id).in('role', ['super_admin', 'admin']).order('name');

    // Define allowed roles for new users based on current admin role
    let allowedRoles = [];
    if (currentAdmin.role === 'super_admin') {
      allowedRoles = [
        { value: 'sdr', label: 'SDR' },
        { value: 'account_executive', label: 'Account Executive' },
        { value: 'admin', label: 'Admin' },
        { value: 'admin_m', label: 'Admin M (Read-Only)' }
      ];
    } else if (currentAdmin.role === 'admin') {
      allowedRoles = [
        { value: 'sdr', label: 'SDR' },
        { value: 'account_executive', label: 'Account Executive' }
      ];
    }

    const modalHtml = `
      <div id="add-user-modal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10000;overflow-y:auto">
        <div style="background:#0F1117;border:1px solid #1E2333;border-radius:12px;padding:2rem;max-width:600px;width:90%;margin:2rem">
          <h3 style="color:#F59E0B;margin-bottom:1.5rem">Add New User</h3>

          <div style="margin-bottom:1rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Full Name *</label>
            <input type="text" id="new-user-name" placeholder="John Doe" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
          </div>

          <div style="margin-bottom:1rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Email *</label>
            <input type="email" id="new-user-email" placeholder="john@example.com" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
          </div>

          <div style="margin-bottom:1rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Role *</label>
            <select id="new-user-role" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
              ${allowedRoles.map(r => `<option value="${r.value}">${r.label}</option>`).join('')}
            </select>
          </div>

          <div style="margin-bottom:1rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Team ${teams && teams.length > 0 ? '*' : '(will create NEW)'}</label>
            <select id="new-user-team" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
              ${teams && teams.length > 0 ? teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('') : '<option value="">No teams (will create NEW)</option>'}
            </select>
          </div>

          <div style="margin-bottom:1.5rem">
            <label style="display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#8892AA;margin-bottom:.5rem">Manager ${managers && managers.length > 0 ? '*' : '(none available)'}</label>
            <select id="new-user-manager" style="width:100%;background:#141720;border:1px solid #1E2333;border-radius:8px;padding:.75rem;color:#EEF0F8;font-size:.9rem">
              ${managers && managers.length > 0 ? managers.map(m => `<option value="${m.id}">${m.name} (${m.role.replace(/_/g, ' ')})</option>`).join('') : '<option value="">No managers available</option>'}
            </select>
          </div>

          <div style="background:#FEF3C7;border-left:4px solid #F59E0B;padding:1rem;margin-bottom:1.5rem;border-radius:4px">
            <p style="color:#92400E;font-size:.85rem;margin:0">📧 Password reset link will be emailed to shaamel@shaamelz.com with user details.</p>
          </div>

          <div style="display:flex;gap:.75rem;justify-content:flex-end">
            <button onclick="closeModal('add-user-modal')" style="background:#272E42;color:#8892AA;padding:.75rem 1.5rem;border-radius:8px;border:1px solid #1E2333;cursor:pointer">Cancel</button>
            <button onclick="executeAddUser()" style="background:#10B981;color:#fff;padding:.75rem 1.5rem;border-radius:8px;border:none;font-weight:700;cursor:pointer">Add User</button>
          </div>
        </div>
      </div>
    `;

    document.body.insertAdjacentHTML('beforeend', modalHtml);
  } catch (err) {
    console.error('[Admin] Open add user modal error:', err);
    alert(`Error: ${err.message}`);
  }
}

async function executeAddUser() {
  try {
    const name = document.getElementById('new-user-name').value.trim();
    const email = document.getElementById('new-user-email').value.trim();
    const role = document.getElementById('new-user-role').value;
    const teamId = document.getElementById('new-user-team').value;
    const managerId = document.getElementById('new-user-manager').value;

    if (!name || !email) {
      alert('Please fill in name and email');
      return;
    }

    if (!email.includes('@')) {
      alert('Please enter a valid email address');
      return;
    }

    const { data: { session } } = await sb.auth.getSession();
    const response = await fetch(`https://gokslnrvxqledagcwghq.supabase.co/functions/v1/generate-invite-link`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        name,
        email,
        role,
        teamId: teamId || null,
        managerId: managerId || null,
        crmEnabled: true
      })
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error || 'Failed to create user');

    closeModal('add-user-modal');
    alert(`✓ User created successfully!\n\nPassword reset email sent to shaamel@shaamelz.com\n\nForward the link to ${email}`);
    loadUsers();
  } catch (err) {
    console.error('[Admin] Execute add user error:', err);
    alert(`Error: ${err.message}`);
  }
}

function closeModal(modalId) {
  const modal = document.getElementById(modalId);
  if (modal) modal.remove();
}

async function logout() {
  await sb.auth.signOut();
  window.location.replace('./auth.html');
}

function waitForSupabaseClient(callback, attempts = 0) {
  if (window.supabaseClient) {
    callback();
  } else if (attempts < 50) {
    setTimeout(() => waitForSupabaseClient(callback, attempts + 1), 100);
  } else {
    console.error('supabaseClient never initialized');
    alert('Failed to load. Please refresh the page.');
  }
}

waitForSupabaseClient(init);
